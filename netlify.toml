# All Forward — Netlify config (static HTML site, no build step)
[build]
  publish = "."
  command = ""

# Serverless functions (daily disaster-alert engine lives here)
[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Site-wide security headers (no-breakage set; CSP omitted globally because the
# marketing pages are not yet audited for inline/third-party content).
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

# Enforcing CSP scoped to the Ops Center (fully controlled + tested against its live
# data feeds). Allowlist derived empirically from the dashboard's network calls:
#   connect: FEMA OpenFEMA (drawer), NWS alerts, NHC storms, NIFC wildfires, Google Analytics
#   script:  self + GA tag manager + unpkg (Leaflet map lib) (+ 'unsafe-inline' for inline snippets)
#   style:   self + unpkg (Leaflet CSS) + 'unsafe-inline' (inline style attributes in the markup)
#   img:     self + data: + GA + unpkg (Leaflet markers) + CARTO basemap tiles
# Re-declares the base headers so Ops Center keeps them regardless of Netlify's merge order.
[[headers]]
  for = "/ops-center/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://unpkg.com; style-src 'self' 'unsafe-inline' https://unpkg.com; img-src 'self' data: https://www.google-analytics.com https://www.googletagmanager.com https://unpkg.com https://*.basemaps.cartocdn.com; font-src 'self'; connect-src 'self' https://www.fema.gov https://api.weather.gov https://www.nhc.noaa.gov https://services3.arcgis.com https://www.google-analytics.com https://*.google-analytics.com https://*.analytics.google.com https://www.googletagmanager.com; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'self'; upgrade-insecure-requests"
